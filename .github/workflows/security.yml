name: Security Checks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run every Monday at 09:00 UTC — weekly dependency audit
    - cron: "0 9 * * 1"

jobs:
  # ── #11 Dependency шинэчлэлт + #26 Supply Chain Security ─────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: npm audit (high severity)
        run: npm audit --audit-level=high
        # Fails the build if any HIGH or CRITICAL vulnerabilities found

      - name: Check for known malicious packages
        run: npx better-npm-audit audit --level high
        continue-on-error: true

  # ── #27 Static Analysis (ESLint security rules) ───────────────────────────
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: ESLint with security rules
        run: npm run lint
        # eslint-plugin-security rules are included in eslint.config.mjs

  # ── #25 Vulnerability Scanning ───────────────────────────────────────────
  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript type check
        run: npx tsc --noEmit
        # Catches type errors that could indicate security issues

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

  # ── Build verification ────────────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [dependency-audit, static-analysis]
    env:
      # Minimal env vars needed for build — real secrets not needed
      DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake?pgbouncer=true"
      DIRECT_URL: "postgresql://fake:fake@localhost:5432/fake"
      NEXT_PUBLIC_STACK_PROJECT_ID: "fake-project-id"
      NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: "fake-key"
      STACK_SECRET_SERVER_KEY: "fake-secret"
      NEXT_PUBLIC_SUPABASE_URL: "https://fake.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "fake-anon-key"
      UPSTASH_REDIS_REST_URL: "https://fake.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "fake-token"
      NEXT_PUBLIC_APP_URL: "https://fake.vercel.app"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
